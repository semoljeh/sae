<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Generator Tool - Magic Auto-Parse (Edisi Fix)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .teks-arab { font-family: 'Amiri', serif !important; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-3 md:p-8">

    <div class="max-w-7xl mx-auto bg-white rounded-[2rem] shadow-xl overflow-hidden flex flex-col lg:flex-row border border-slate-200">
        
        <div class="w-full lg:w-1/2 p-6 md:p-10 border-b lg:border-b-0 lg:border-r border-slate-200 bg-slate-50/50 flex flex-col max-h-[90vh] overflow-y-auto">
            
            <div class="mb-6 flex justify-between items-start gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-1 flex items-center gap-2">
                        <i class="fa-solid fa-wand-magic-sparkles text-teal-600"></i> Magic Auto-Parse
                    </h2>
                    <p class="text-sm text-slate-500">Sistem memisah otomatis (Arab-Latin-Arti) + Auto ﴿x﴾</p>
                </div>
                <button onclick="generateMagicJSON()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold text-xs py-3 px-4 rounded-xl shadow-lg hover:shadow-teal-500/30 transition-all active:scale-95 flex items-center gap-2 shrink-0">
                    <i class="fa-solid fa-bolt"></i> GENERATE
                </button>
            </div>

            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm mb-6 shrink-0">
                <div class="mb-4">
                    <label class="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wider">Judul Utama</label>
                    <input type="text" id="judulUtama" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-teal-500 transition-all" placeholder="Contoh: DOA SETELAH SHALAT">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wider">Judul Arab / Basmalah</label>
                    <input type="text" id="judul" dir="rtl" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-right teks-arab text-xl focus:outline-none focus:border-teal-500 transition-all" value="بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ">
                </div>
            </div>

            <div class="flex-1 flex flex-col min-h-[300px]">
                <div class="flex justify-between items-end mb-2">
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider">Area Copy-Paste</label>
                    <span class="text-[10px] bg-amber-100 text-amber-700 px-2 py-1 rounded-lg font-bold">Pisahkan dengan baris kosong (Enter 2x)</span>
                </div>
                <textarea id="bulkInput" class="w-full flex-1 bg-white border border-slate-300 rounded-xl p-4 text-sm focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-200 transition-all resize-none shadow-inner leading-relaxed" 
placeholder="Contoh Format:

وَلَهُ الْحَمْدُ فِي السَّمَوَاتِ وَالأَرْضِ وَعَشِيًّا وَحِيْنَ تُظْهِرُوْنَ ٣
Walahul-ḫamdu fis-samâwâti wal-ardli wa ‘asyiyyan wa ḫîna tudh-hirûn(a)
Dan hanya bagi-Nya segala puji di langit dan di bumi dan di waktu petang dan di saat kalian berada di waktu dhuhur. (QS Ar-Rum: 18)

[ENTER 2X DI SINI UNTUK BAIT SELANJUTNYA]

teks arab kedua...
teks latin kedua...
arti kedua..."></textarea>
            </div>
        </div>

        <div class="w-full lg:w-1/2 flex flex-col bg-slate-800 max-h-[90vh]">
            
            <div class="h-1/2 p-4 md:p-6 flex flex-col border-b border-slate-700">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-slate-200 font-bold flex items-center gap-2"><i class="fa-solid fa-code text-teal-400"></i> Output JSON (Sesuai Struktur Asli)</h3>
                    <div class="flex gap-2">
                        <button id="btn-copy" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs font-semibold py-1.5 px-3 rounded-lg transition-colors flex items-center gap-2"><i class="fa-regular fa-copy"></i> Copy</button>
                        <button id="btn-download" class="bg-teal-600 hover:bg-teal-500 text-white text-xs font-semibold py-1.5 px-3 rounded-lg transition-colors flex items-center gap-2"><i class="fa-solid fa-download"></i> Download</button>
                    </div>
                </div>
                <textarea id="output" readonly class="w-full h-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-emerald-400 font-mono text-sm focus:outline-none resize-none leading-relaxed"></textarea>
            </div>

            <div class="h-1/2 p-4 md:p-6 flex flex-col bg-slate-50 overflow-hidden">
                <div class="flex justify-between items-center mb-3 z-10 relative">
                    <h3 class="text-slate-800 font-bold flex items-center gap-2"><i class="fa-solid fa-mobile-screen text-teal-600"></i> Live Preview UI</h3>
                    <button id="btn-reset" class="text-red-500 hover:bg-red-50 text-xs font-semibold py-1.5 px-3 rounded-lg transition-colors border border-transparent hover:border-red-100 flex items-center gap-2"><i class="fa-solid fa-trash-can"></i> Bersihkan</button>
                </div>
                <div id="preview-container" class="w-full h-full overflow-y-auto pr-2 pb-10 z-10 relative rounded-xl border border-slate-200 bg-slate-100/50 p-4">
                    <p class="text-sm font-sans text-slate-400 text-center italic mt-8 font-light">Hasil preview akan muncul di sini secara otomatis...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateMagicJSON() {
            try {
                const judulUtama = document.getElementById('judulUtama').value.trim();
                const judul = document.getElementById('judul').value.trim();
                const rawText = document.getElementById('bulkInput').value.trim();

                let baitListArray = [];
                let previewHtml = '';

                let basmalahHtml = judul ? `<div class="text-center mb-6"><h3 class="teks-arab text-xl text-teal-700 font-bold text-right w-full" dir="rtl">${judul}</h3></div>` : '';
                let garisHtml = `<div class="w-full h-[1px] bg-slate-200 mb-6"></div>`;
                let judulUtamaHtml = judulUtama ? `<div class="text-center mb-8"><span class="text-[10px] font-bold text-teal-700 uppercase tracking-wide block max-w-[90%] mx-auto leading-relaxed">${judulUtama}</span></div>` : '';
                let headerCard = (judulUtama || judul) ? `${basmalahHtml}${garisHtml}${judulUtamaHtml}` : '';

                if (rawText !== "") {
                    const blokBait = rawText.split(/\n\s*\n/);
                    let itemTerisi = 0;

                    blokBait.forEach((blok) => {
                        const baris = blok.split('\n').map(b => b.trim()).filter(b => b !== '');
                        
                        if (baris.length > 0) {
                            itemTerisi++;
                            let arabText = "";
                            let latinText = "";
                            let artiText = "";

                            // Deteksi otomatis baris Arab, Latin, Arti
                            if (baris.length === 1) {
                                arabText = baris[0]; 
                            } else if (baris.length === 2) {
                                arabText = baris[0];
                                artiText = baris[1]; 
                            } else if (baris.length >= 3) {
                                arabText = baris[0];
                                latinText = baris[1]; 
                                artiText = baris.slice(2).join('<br>'); 
                            }

                            // JURUS ANTI-WORD: Paksa angka Latin (0-9) di baris Arab menjadi Angka Arab (٠-٩)
                            if (arabText) {
                                const arrAngkaArab = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
                                arabText = arabText.replace(/[0-9]/g, d => arrAngkaArab[d]);
                            }

                            // Gabungkan Latin dan Terjemahan dalam satu kolom untuk struktur bait_list
                            let terjemahanGabung = "";
                            if (latinText && latinText !== '-') terjemahanGabung += `<p class="latin-read-text text-teal-700 font-semibold mb-3 leading-relaxed text-justify mt-1">${latinText}</p>`;
                            if (artiText && artiText !== '-') terjemahanGabung += `<p class="translation-read-text text-slate-500 font-medium leading-relaxed text-justify">${artiText}</p>`;

                            // Terapkan ke struktur bait_list yang persis sama dengan sebelumnya
                            baitListArray.push({
                                "id": itemTerisi,
                                "syathr_awal": arabText || "",
                                "syathr_tsani": "",
                                "terjemahan": terjemahanGabung || ""
                            });

                            // 💡 PERBAIKAN UTAMA: Menyisipkan huruf 'x' ke dalam kurung ornamen untuk live preview generator 
                            let formattedArab = arabText ? arabText.replace(/([٠-٩]+)/g, '&nbsp;<span class="mx-1 font-sans font-bold text-teal-600 text-[0.8em]" dir="rtl">﴿x$1﴾</span>') : '';
                            
                            let terjemahanHtml = (terjemahanGabung !== '') 
                                ? `<div class="mt-3 text-left mb-2">
                                    <button class="w-8 h-8 inline-flex items-center justify-center bg-teal-50 border border-teal-100 rounded-xl shadow-sm text-teal-700">
                                        <i class="fa-solid fa-book"></i>
                                    </button>
                                   </div>
                                   <div class="w-full h-[1px] bg-slate-100 my-4"></div>
                                   <div dir="ltr">${terjemahanGabung}</div>` 
                                : '';

                            // Teks Arab dipaksa text-right w-full
                            previewHtml += `
                            <div class="bg-white p-6 rounded-3xl text-center shadow-sm border border-slate-200 mb-6 relative">
                                <div class="absolute left-4 top-4 bg-teal-50 text-teal-600 text-[9px] font-bold w-5 h-5 rounded-full flex items-center justify-center border border-teal-100">${itemTerisi}</div>
                                ${itemTerisi === 1 ? headerCard : ''}
                                <p class="teks-arab mb-6 text-slate-800 text-right w-full" dir="rtl" lang="ar" style="font-size: 28px; line-height: 2.4;">${formattedArab}</p>
                                ${terjemahanHtml}
                            </div>`;
                        }
                    });
                }

                // Struktur JSON Asli sesuai permintaan aplikasi utama
                const data = {
                    "metadata": {
                        "generated_at": new Date().toISOString(),
                        "tool": "JSON Generator Tool Arabic - Per Baris Tunggal"
                    },
                    "konten": {
                        "judul_utama": judulUtama || null,
                        "pembuka_basmalah": judul || null,
                        "bait_list": baitListArray
                    }
                };

                const outputEl = document.getElementById('output');
                const previewEl = document.getElementById('preview-container');

                if (baitListArray.length > 0) {
                    outputEl.value = JSON.stringify(data, null, 4); 
                    previewEl.innerHTML = previewHtml;
                } else {
                    outputEl.value = '';
                    previewEl.innerHTML = '<p class="text-sm font-sans text-slate-400 text-center italic mt-8 font-light">Hasil preview visual akan muncul di sini...</p>';
                }
            } catch (err) {
                alert("Ada kesalahan sistem saat Generate: " + err.message);
                console.error(err);
            }
        }

        // Event Listener Tombol
        document.getElementById('btn-copy').addEventListener('click', function() {
            const output = document.getElementById('output');
            if (!output.value) return alert('Data kosong!');
            navigator.clipboard.writeText(output.value);
            this.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
            this.classList.replace('bg-slate-700', 'bg-emerald-600');
            setTimeout(() => {
                this.innerHTML = '<i class="fa-regular fa-copy"></i> Copy';
                this.classList.replace('bg-emerald-600', 'bg-slate-700');
            }, 2000);
        });

        document.getElementById('btn-download').addEventListener('click', function() {
            const output = document.getElementById('output');
            if (!output.value) return alert('Data kosong!');
            const blob = new Blob([output.value], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `doa_auto_parse_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById('btn-reset').addEventListener('click', function() {
            if (confirm('Yakin ingin membersihkan layar?')) {
                document.getElementById('judulUtama').value = '';
                document.getElementById('judul').value = 'بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ';
                document.getElementById('bulkInput').value = '';
                generateMagicJSON();
            }
        });

        // Inisialisasi awal layar kosong
        generateMagicJSON();
    </script>
</body>
</html>
