<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koneksi Terputus - Al Mukhtar</title>
    
    <style>
        /* CSS Murni (Tanpa Internet) */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { width: 100%; max-width: 360px; background: white; border-radius: 32px; padding: 35px 25px; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.06); border: 1px solid #f1f5f9; }
        
        .logo-text { font-size: 42px; color: #007A78; font-weight: bold; line-height: 1; margin-bottom: 5px; font-family: 'Amiri', 'Traditional Arabic', 'Times New Roman', serif; }
        .logo-sub { font-size: 9px; color: #94a3b8; font-weight: bold; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 35px; }
        
        .icon-wrapper { position: relative; width: 110px; height: 110px; margin: 0 auto 30px; background: #f8fafc; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 8px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.03); animation: float 3s ease-in-out infinite; z-index: 10; }
        .radar-pulse { position: absolute; width: 100%; height: 100%; background: #ccfbf1; border-radius: 50%; z-index: -1; animation: pulse 2s infinite; }
        
        .title { font-size: 20px; font-weight: 900; color: #1e293b; letter-spacing: -0.5px; margin-bottom: 10px; }
        .desc { font-size: 11px; color: #64748b; line-height: 1.6; margin-bottom: 30px; padding: 0 10px; }
        
        /* Modifikasi Tombol Coba Lagi: Lebih kecil dan ke tengah */
        .btn-primary { width: fit-content; margin: 0 auto; background: #007A78; color: white; border: none; padding: 12px 32px; border-radius: 12px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 6px 15px rgba(0, 122, 120, 0.25); transition: 0.2s; }
        .btn-primary:active { transform: scale(0.96); }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-text">المختار</div>
        <div class="logo-sub">Digital Library</div>

        <div class="icon-wrapper">
            <div class="radar-pulse"></div>
            <svg viewBox="0 0 24 24" width="50" height="50" stroke="#cbd5e1" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="position: absolute;">
                <path d="M5 12.55a11 11 0 0 1 14 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line>
            </svg>
            <svg viewBox="0 0 24 24" width="65" height="65" stroke="#f87171" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="position: absolute;">
                <line x1="2" y1="2" x2="22" y2="22"></line>
            </svg>
        </div>

        <div class="title">Koneksi Terputus</div>
        <div class="desc">Aplikasi membutuhkan koneksi internet. Silakan periksa jaringan WiFi atau Data Seluler Anda, lalu coba lagi.</div>

        <!-- Tombol Coba Lagi -->
        <button onclick="cobaLagi()" class="btn-primary" id="btn-coba">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
            Coba Lagi
        </button>
    </div>

<script>
        // 1. Fungsi tombol Coba Lagi
        function cobaLagi() {
            const btn = document.getElementById('btn-coba');
            btn.innerHTML = 'MENGHUBUNGKAN...';
            btn.style.opacity = '0.7';
            setTimeout(() => {
                window.location.replace("https://semoljeh.github.io/sae/");
            }, 600);
        }

        // 2. TRIK MEMBAJAK TOMBOL 'BACK' DI HP
        // Memasukkan status "jebakan" ke dalam riwayat browser saat halaman dimuat
        window.history.pushState({ page: "offline" }, "", "");

        // Mendengarkan aksi ketika tombol fisik 'Back' di HP ditekan
        window.addEventListener("popstate", function(event) {
            // Memaksa aplikasi untuk tertutup saat tombol kembali ditekan
            try {
                if (typeof Android !== 'undefined' && typeof Android.exitApp === 'function') {
                    Android.exitApp(); // Perintah khusus Website 2 APK
                } else if (navigator.app && navigator.app.exitApp) {
                    navigator.app.exitApp(); // Perintah khusus sistem Android lama
                } else {
                    window.close(); // Perintah standar menutup jendela
                }
            } catch (e) {
                window.close();
            }
        });
    </script>
</body>
</html>
