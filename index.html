<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quran.com Style</title>

<!-- FONT QURAN.COM ORIGINAL -->
<style>

/* =========================================================
   FONT ORIGINAL QURAN.COM
========================================================= */
@font-face {
    font-family: 'QCF';
    src: url('https://static.qurancdn.com/fonts/quran/hafs/v2/woff2/p1.woff2') format('woff2');
}

/* =========================================================
   RESET
========================================================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f8fafc;
    font-family:system-ui;
    color:#111827;
}

/* =========================================================
   HEADER
========================================================= */
.header{
    background:#0f766e;
    color:white;
    padding:22px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:999;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.header h1{
    font-size:22px;
    font-weight:800;
}

/* =========================================================
   CONTAINER
========================================================= */
.container{
    padding:16px;
}

/* =========================================================
   SURAH CARD
========================================================= */
.surah-card{
    background:white;
    border-radius:24px;
    padding:18px;
    margin-bottom:14px;
    border:1px solid #eef2f7;
    box-shadow:0 4px 12px rgba(0,0,0,.04);
    cursor:pointer;
    transition:.2s;
}

.surah-card:active{
    transform:scale(.98);
}

.surah-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.surah-name{
    font-size:18px;
    font-weight:800;
}

.surah-arab{
    font-family:'QCF';
    font-size:32px;
    direction:rtl;
}

/* =========================================================
   AYAT CARD
========================================================= */
.ayah-box{
    background:white;
    border-radius:28px;
    padding:24px;
    margin-bottom:18px;
    border:1px solid #eef2f7;
    box-shadow:0 4px 15px rgba(0,0,0,.04);
}

/* =========================================================
   FONT QURAN ORIGINAL
========================================================= */
.arabic{

    font-family:'QCF';

    direction:rtl;

    text-align:right;

    unicode-bidi:plaintext;

    font-size:42px;

    line-height:2.25;

    letter-spacing:0;

    word-spacing:0;

    font-feature-settings:
        "liga" 1,
        "calt" 1,
        "kern" 1;

    font-variant-ligatures:contextual;

    text-rendering:optimizeLegibility;

    -webkit-font-smoothing:antialiased;

    color:#111827;
}

/* =========================================================
   TERJEMAHAN
========================================================= */
.translation{
    margin-top:20px;
    color:#475569;
    line-height:1.8;
    font-size:16px;
}

/* =========================================================
   NOMOR AYAT
========================================================= */
.ayah-number{
    color:#0f766e;
    font-size:22px;
    vertical-align:middle;
}

/* =========================================================
   BUTTON
========================================================= */
.back-btn{
    background:#0f766e;
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:999px;
    font-weight:700;
    margin-bottom:20px;
    cursor:pointer;
}

/* =========================================================
   LOADING
========================================================= */
.loading{
    text-align:center;
    padding:50px;
    color:#0f766e;
    font-weight:700;
}

/* =========================================================
   RESPONSIVE
========================================================= */
@media(max-width:480px){

    .arabic{
        font-size:36px;
        line-height:2.15;
    }

    .surah-arab{
        font-size:28px;
    }

}

</style>
</head>
<body>

<div class="header">
    <h1>Al-Qur'an</h1>
</div>

<div class="container" id="app">

    <div class="loading">
        Memuat Quran...
    </div>

</div>

<script>

/* =========================================================
   API QURAN.COM
========================================================= */
const API = "https://api.quran.com/api/v4";

/* =========================================================
   ELEMENT
========================================================= */
const app = document.getElementById("app");

/* =========================================================
   LOAD SURAH
========================================================= */
async function loadSurahList(){

    app.innerHTML = `
        <div class="loading">
            Memuat Surah...
        </div>
    `;

    try{

        const res = await fetch(
            `${API}/chapters`
        );

        const data = await res.json();

        renderSurah(data.chapters);

    }catch(error){

        app.innerHTML = `
            <div class="loading">
                Gagal memuat data
            </div>
        `;
    }
}

/* =========================================================
   RENDER SURAH
========================================================= */
function renderSurah(chapters){

    app.innerHTML = "";

    chapters.forEach(surah=>{

        app.innerHTML += `

            <div class="surah-card"
                 onclick="openSurah(${surah.id})">

                <div class="surah-top">

                    <div>
                        <div class="surah-name">
                            ${surah.id}. ${surah.name_simple}
                        </div>
                    </div>

                    <div class="surah-arab">
                        ${surah.name_arabic}
                    </div>

                </div>

            </div>

        `;
    });
}

/* =========================================================
   OPEN SURAH
========================================================= */
async function openSurah(id){

    app.innerHTML = `
        <div class="loading">
            Memuat Ayat...
        </div>
    `;

    try{

        const arabRes = await fetch(
            `${API}/quran/verses/uthmani?chapter_number=${id}`
        );

        const arabData = await arabRes.json();

        const indoRes = await fetch(
            `${API}/quran/translations/33?chapter_number=${id}`
        );

        const indoData = await indoRes.json();

        let html = `

            <button class="back-btn"
                    onclick="loadSurahList()">

                ← Kembali

            </button>

        `;

        arabData.verses.forEach((ayah,index)=>{

            const translation =
                indoData.translations[index];

            html += `

                <div class="ayah-box">

                    <div class="arabic">

                        ${ayah.text_uthmani}

                        <span class="ayah-number">
                            ۝${ayah.verse_key.split(':')[1]}
                        </span>

                    </div>

                    <div class="translation">

                        ${translation.text}

                    </div>

                </div>

            `;
        });

        app.innerHTML = html;

    }catch(error){

        app.innerHTML = `
            <div class="loading">
                Gagal memuat ayat
            </div>
        `;
    }
}

/* =========================================================
   START
========================================================= */
loadSurahList();

</script>

</body>
</html>
