<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Quran App</title>

<style>

/* =========================
   RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f8fafc;
    font-family:sans-serif;
    color:#111827;
}

/* =========================
   FONT QURAN
========================= */
@font-face{
    font-family:'Quran';
    src:url('https://cdn.jsdelivr.net/gh/quran/quran.com-frontend-next@master/public/fonts/UthmanicHafs1Ver18.woff2') format('woff2');
}

/* =========================
   HEADER
========================= */
.header{
    background:#0f766e;
    color:white;
    padding:20px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:99;
}

.header h1{
    font-size:22px;
    font-weight:800;
}

/* =========================
   CONTAINER
========================= */
.container{
    padding:18px;
}

/* =========================
   SURAH CARD
========================= */
.surah-card{
    background:white;
    border-radius:24px;
    padding:18px;
    margin-bottom:16px;
    box-shadow:0 4px 15px rgba(0,0,0,.05);
    border:1px solid #eef2f7;
    cursor:pointer;
    transition:.2s;
}

.surah-card:active{
    transform:scale(.98);
}

.surah-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.surah-name{
    font-size:18px;
    font-weight:800;
}

.surah-arab{
    font-family:'Quran';
    font-size:28px;
    direction:rtl;
}

/* =========================
   AYAT
========================= */
.ayah-box{
    background:white;
    border-radius:28px;
    padding:22px;
    margin-bottom:18px;
    border:1px solid #eef2f7;
    box-shadow:0 4px 15px rgba(0,0,0,.04);
}

.arabic{
    font-family:'Quran';
    font-size:40px;
    line-height:2.2;
    direction:rtl;
    text-align:right;
    letter-spacing:0;
    word-spacing:0;
    font-feature-settings:
        "liga" 1,
        "calt" 1,
        "kern" 1;
}

.translation{
    margin-top:18px;
    font-size:16px;
    color:#475569;
    line-height:1.8;
}

.ayah-number{
    color:#0f766e;
    font-size:22px;
}

/* =========================
   LOADING
========================= */
.loading{
    text-align:center;
    padding:40px;
    font-weight:700;
    color:#0f766e;
}

/* =========================
   BACK BUTTON
========================= */
.back-btn{
    background:#0f766e;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:100px;
    font-weight:700;
    margin-bottom:20px;
    cursor:pointer;
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:480px){

    .arabic{
        font-size:34px;
        line-height:2.1;
    }

}

</style>
</head>
<body>

<div class="header">
    <h1>Al-Qur'an</h1>
</div>

<div class="container" id="app">

    <div class="loading">
        Memuat Surah...
    </div>

</div>

<script>

/* =========================
   API
========================= */
const API = "https://api.quran.com/api/v4";

/* =========================
   APP
========================= */
const app = document.getElementById("app");

/* =========================
   LOAD SURAH
========================= */
async function loadSurahList(){

    app.innerHTML = `
        <div class="loading">
            Memuat Surah...
        </div>
    `;

    try{

        const res = await fetch(
            `${API}/chapters`
        );

        const data = await res.json();

        renderSurah(data.chapters);

    }catch(err){

        app.innerHTML = `
            <div class="loading">
                Gagal memuat data
            </div>
        `;
    }
}

/* =========================
   RENDER SURAH
========================= */
function renderSurah(chapters){

    app.innerHTML = "";

    chapters.forEach(surah=>{

        app.innerHTML += `

            <div class="surah-card"
                 onclick="openSurah(${surah.id}, '${surah.name_simple}')">

                <div class="surah-top">

                    <div>
                        <div class="surah-name">
                            ${surah.id}. ${surah.name_simple}
                        </div>
                    </div>

                    <div class="surah-arab">
                        ${surah.name_arabic}
                    </div>

                </div>

            </div>

        `;
    });

}

/* =========================
   OPEN SURAH
========================= */
async function openSurah(id,name){

    app.innerHTML = `
        <div class="loading">
            Memuat Ayat...
        </div>
    `;

    try{

        const arabRes = await fetch(
            `${API}/quran/verses/uthmani?chapter_number=${id}`
        );

        const arabData = await arabRes.json();

        const indoRes = await fetch(
            `${API}/quran/translations/33?chapter_number=${id}`
        );

        const indoData = await indoRes.json();

        let html = `

            <button class="back-btn"
                    onclick="loadSurahList()">

                ← Kembali

            </button>

        `;

        arabData.verses.forEach((ayah,index)=>{

            const translation =
                indoData.translations[index];

            html += `

                <div class="ayah-box">

                    <div class="arabic">

                        ${ayah.text_uthmani}

                        <span class="ayah-number">
                            ۝${ayah.verse_key.split(':')[1]}
                        </span>

                    </div>

                    <div class="translation">

                        ${translation.text}

                    </div>

                </div>

            `;

        });

        app.innerHTML = html;

    }catch(err){

        app.innerHTML = `
            <div class="loading">
                Gagal memuat ayat
            </div>
        `;
    }

}

/* =========================
   START APP
========================= */
loadSurahList();

</script>

</body>
</html>
