<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="
width=device-width,
initial-scale=1.0,
viewport-fit=cover">

<title>Reader</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="
https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Amiri:wght@400;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="
https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* =========================================
   RESET
========================================= */

*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}

html,
body{

    width:100%;
    height:100%;

    overflow:hidden;

    background:#f8fafc;

    font-family:
    'Inter',
    sans-serif;

    -webkit-tap-highlight-color:
    transparent;

}

/* =========================================
   READER
========================================= */

.reader{

    width:100%;
    height:100%;

    overflow-y:auto;

}

/* =========================================
   HEADER
========================================= */

.reader-header{

    position:sticky;

    top:0;

    z-index:999;

    height:72px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    gap:10px;

    padding:
    0
    16px;

    background:white;

    border-bottom:
    1px solid #e2e8f0;

}

/* LEFT */

.header-left{

    display:flex;
    align-items:center;

    gap:12px;

    min-width:0;

    flex:1;

}

/* RIGHT */

.header-right{

    display:flex;
    align-items:center;

    gap:8px;

}

/* BUTTON */

.header-btn{

    width:42px;
    height:42px;

    border:none;

    border-radius:14px;

    background:#f1f5f9;

    color:#0f172a;

    font-size:16px;

    flex-shrink:0;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:.2s;

}

/* DISABLED */

.header-btn.disabled{

    opacity:.3;

    pointer-events:none;

}

/* TITLE */

.reader-title{

    font-size:15px;

    font-weight:800;

    color:#0f766e;

    white-space:nowrap;

    overflow:hidden;

    text-overflow:ellipsis;

}

/* =========================================
   BASMALAH
========================================= */

.basmalah{

    background:white;

    padding:
    18px
    20px
    16px;

    border-bottom:
    1px solid #e2e8f0;

    text-align:center;

    font-family:
    'Amiri',
    serif;

    font-size:34px;

    line-height:1.8;

    color:#0f172a;

}

/* =========================================
   CONTENT
========================================= */

.reader-content{

    padding:
    26px
    20px
    140px;

}

/* =========================================
   ITEM
========================================= */

.reader-item{

    margin-bottom:44px;

}

/* =========================================
   ARAB
========================================= */

.reader-arab{

    font-family:
    'Amiri',
    serif;

    font-size:38px;

    line-height:2.3;

    text-align:justify;

    direction:rtl;

    color:#0f172a;

}

/* =========================================
   TOGGLE
========================================= */

.translate-toggle{

    margin-top:20px;

    width:max-content;

    padding:
    10px
    18px;

    border:none;

    border-radius:999px;

    background:#0f766e;

    color:white;

    font-size:12px;

    font-weight:700;

}

/* =========================================
   TRANSLATION
========================================= */

.translation{

    display:none;

    margin-top:18px;

}

.translation.show{

    display:block;

}

/* LATIN */

.reader-latin{

    font-size:15px;

    line-height:1.9;

    color:#0f766e;

    font-style:italic;

}

/* ARTI */

.reader-arti{

    margin-top:12px;

    font-size:15px;

    line-height:2;

    color:#475569;

}

/* EMPTY */

.empty{

    text-align:center;

    margin-top:40px;

    color:#94a3b8;

    font-weight:700;

}

/* =========================================
   MOBILE
========================================= */

@media(max-width:480px){

    .reader-header{

        height:66px;

        padding:0 14px;

    }

    .header-btn{

        width:38px;
        height:38px;

        border-radius:12px;

        font-size:14px;

    }

    .reader-title{

        font-size:14px;

    }

    .basmalah{

        top:66px;

        font-size:28px;

        padding:
        14px
        16px;

    }

    .reader-content{

        padding:
        22px
        16px
        120px;

    }

    .reader-arab{

        font-size:30px;

    }

}

/* =========================================
   SMART WATCH
========================================= */

@media(max-width:280px){

    .reader-header{

        height:52px;

        padding:0 8px;

        gap:6px;

    }

    .header-left{

        gap:6px;

    }

    .header-right{

        gap:4px;

    }

    .header-btn{

        width:28px;
        height:28px;

        border-radius:8px;

        font-size:10px;

    }

    .reader-title{

        font-size:9px;

    }

    .basmalah{

        top:52px;

        font-size:16px;

        padding:
        8px
        10px;

    }

    .reader-content{

        padding:
        12px
        10px
        80px;

    }

    .reader-item{

        margin-bottom:24px;

    }

    .reader-arab{

        font-size:18px;

        line-height:2;

    }

    .translate-toggle{

        padding:
        6px
        10px;

        font-size:8px;

    }

    .reader-latin{

        font-size:9px;

    }

    .reader-arti{

        font-size:9px;

        line-height:1.8;

    }

}

</style>
</head>

<body>

<div class="reader">

    <!-- HEADER -->

    <header class="reader-header">

        <!-- LEFT -->

        <div class="header-left">

            <button
            class="header-btn"
            onclick="history.back()">

                <i class="fa-solid fa-arrow-left"></i>

            </button>

            <div class="reader-title"
            id="readerTitle">

                Loading...

            </div>

        </div>

        <!-- RIGHT -->

        <div class="header-right">

            <button
            class="header-btn"
            id="prevBtn"
            onclick="prevPage()">

                <i class="fa-solid fa-chevron-left"></i>

            </button>

            <button
            class="header-btn"
            id="nextBtn"
            onclick="nextPage()">

                <i class="fa-solid fa-chevron-right"></i>

            </button>

        </div>

    </header>

    <!-- BASMALAH -->

    <div class="basmalah">

        بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ

    </div>

    <!-- CONTENT -->

    <main class="reader-content"
    id="readerContent"></main>

</div>

<script>

/* =========================================
   URL PARAM
========================================= */

const params =
new URLSearchParams(
window.location.search
);

const file =
params.get('file');

/* =========================================
   JSON LIST
========================================= */

const files = [

    "istighotsah-bab1.json",
    "istighotsah-bab2.json",
    "istighotsah-bab3.json"

];

let currentIndex =
files.indexOf(file);

/* =========================================
   LOAD READER
========================================= */

async function loadReader(){

    if(!file){

        document
        .getElementById('readerContent')

        .innerHTML =

        `
        <div class="empty">

            File tidak ditemukan

        </div>
        `;

        return;

    }

    try{

        const response =
        await fetch(
            `json/${file}`
        );

        const data =
        await response.json();

        /* TITLE */

        document
        .getElementById('readerTitle')
        .innerText =
        data.title;

        /* CONTENT */

        const container =
        document
        .getElementById('readerContent');

        container.innerHTML='';

        data.content.forEach((item,index)=>{

container.innerHTML += `

<div class="reader-item">

    <!-- ARAB -->

    <div class="reader-arab">

        ${item.arab || ''}

    </div>

    ${item.latin || item.arti ? `

    <!-- TOGGLE -->

    <button
    class="translate-toggle"

    onclick="
    toggleTranslation(
    'translation-${index}'
    )
    ">

        Show / Hide Terjemah

    </button>

    <!-- TRANSLATION -->

    <div
    class="translation"

    id="translation-${index}">

        ${item.latin ? `

        <div class="reader-latin">

            ${item.latin}

        </div>

        ` : ''}

        ${item.arti ? `

        <div class="reader-arti">

            ${item.arti}

        </div>

        ` : ''}

    </div>

    ` : ''}

</div>

`;

        });

    }

    catch(error){

        document
        .getElementById('readerContent')

        .innerHTML =

        `
        <div class="empty">

            Gagal memuat JSON

        </div>
        `;

    }

}

/* =========================================
   TOGGLE TRANSLATION
========================================= */

function toggleTranslation(id){

    document
    .getElementById(id)

    .classList.toggle('show');

}

/* =========================================
   UPDATE NAV BUTTON
========================================= */

function updateNavButtons(){

    const prev =
    document.getElementById('prevBtn');

    const next =
    document.getElementById('nextBtn');

    /* PREV */

    if(currentIndex <= 0){

        prev.classList.add('disabled');

    }

    else{

        prev.classList.remove('disabled');

    }

    /* NEXT */

    if(currentIndex >= files.length - 1){

        next.classList.add('disabled');

    }

    else{

        next.classList.remove('disabled');

    }

}

/* =========================================
   NEXT PAGE
========================================= */

function nextPage(){

    if(currentIndex >= files.length - 1){

        return;

    }

    currentIndex++;

    window.location.href =

    `reader.html?file=${files[currentIndex]}`;

}

/* =========================================
   PREVIOUS PAGE
========================================= */

function prevPage(){

    if(currentIndex <= 0){

        return;

    }

    currentIndex--;

    window.location.href =

    `reader.html?file=${files[currentIndex]}`;

}

/* =========================================
   START
========================================= */

loadReader();

updateNavButtons();

</script>

</body>
</html>
